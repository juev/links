name: Cronjob operations

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    container: ghcr.io/juev/instapaper-collector:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run Automation
        run: instapaper-collector
        env:
          RSS_URL: ${{ secrets.RSS_URL }}
      - name: Commit
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: 'update'
